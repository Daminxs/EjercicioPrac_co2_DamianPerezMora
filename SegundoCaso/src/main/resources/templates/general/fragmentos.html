<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"      
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <head th:fragment="head">
        <title>Sistema Eventos</title>
        <meta charset="UTF-8"/>

        <link rel="icon" type="image/png" sizes="16x16" href="/fav/favicon-16x16.png"/>
        <link rel="icon" type="image/png" sizes="32x32" href="/fav/favicon-32x32.png"/>
        <link rel="icon" type="image/png" sizes="96x96" href="/fav/favicon-96x96.png"/>
        <link rel="icon" type="image/png" sizes="256x256" href="/fav/favicon-256x256.png"/>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

        <script th:src="@{/js/rutinas.js}"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

        <link th:href="@{/css/estilos.css}" rel="stylesheet"/>

        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    </head>

    <body class="d-flex flex-column min-vh-100">

        <header th:fragment="header" class="header d-print-none">

            <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
                <div class="container">

                    <a th:href="@{/}" class="navbar-brand">
                        Sistema Eventos
                    </a>

                    <div class="collapse navbar-collapse">

                        <ul class="navbar-nav">

                            <!-- ADMIN -->
                            <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                                <a class="nav-link" th:href="@{/usuario/listado}">
                                    Usuarios
                                </a>
                            </li>

                            <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                                <a class="nav-link" th:href="@{/rol/listado}">
                                    Roles
                                </a>
                            </li>

                            <!-- ADMIN + ORGANIZADOR -->
                            <li class="nav-item" sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_ORGANIZADOR')">
                                <a class="nav-link" th:href="@{/evento/listado}">
                                    Eventos
                                </a>
                            </li>

                            <!-- CONSULTAS SOLO ADMIN -->
                            <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                                <a class="nav-link" th:href="@{/consultas}">
                                    Consultas
                                </a>
                            </li>

                            <!-- CLIENTE SOLO VE EVENTOS (opcional link público si quieres) -->
                            <li class="nav-item" sec:authorize="hasRole('ROLE_CLIENTE')">
                                <a class="nav-link" th:href="@{/evento/listado}">
                                    Eventos
                                </a>
                            </li>

                        </ul>

                        <ul class="navbar-nav ms-auto">

                            <li class="nav-item" sec:authorize="!isAuthenticated()">
                                <a class="nav-link" th:href="@{/login}">
                                    <i class="fas fa-sign-in-alt"></i> Login
                                </a>
                            </li>

                            <li class="nav-item" sec:authorize="isAuthenticated()">
                                <a class="nav-link">
                                    <span sec:authentication="name"></span>
                                </a>
                            </li>

                            <li class="nav-item" sec:authorize="isAuthenticated()">
                                <form method="post" th:action="@{/logout}">
                                    <button class="btn nav-link" type="submit">
                                        <i class="fas fa-sign-out-alt"></i> Logout
                                    </button>
                                </form>
                            </li>

                        </ul>

                    </div>
                </div>
            </nav>

            <section class="py-2 bg-success text-white">
                <div class="container">
                    <h1><i class="fas fa-calendar"></i> Plataforma de Eventos</h1>
                </div>
            </section>

        </header>

        <div class="flex-grow-1"></div>

        <footer th:fragment="footer"
                class="mt-auto p-2 bg-dark text-white text-center">

            <p class="mb-0">Derechos Reservados &copy;</p>

        </footer>

    </body>
</html>
